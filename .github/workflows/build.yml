name: Validate Music App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Verify project structure
        run: |
          echo "=== Project Structure ==="
          ls -la
          echo "=== Source Files ==="
          ls -la src/
          ls -la src/components/
          ls -la src/screens/
          ls -la src/constants/
          
      - name: Verify TypeScript
        run: |
          echo "=== TypeScript Check ==="
          npx tsc --noEmit --skipLibCheck
          
      - name: Success message
        run: |
          echo "======================================"
          echo "✅ Music App validation successful!"
          echo "======================================"
          echo ""
          echo "📱 Features implemented:"
          echo "   • Glass UI design"
          echo "   • Search screen"
          echo "   • Player screen (with swipe gesture)"
          echo "   • Profile screen"
          echo "   • Floating tab bar"
          echo ""
          echo "🚀 To build the full Android APK locally:"
          echo "   1. Clone repo"
          echo "   2. Run npx react-native@latest init MusicApp"
          echo "   3. Copy our source code over"
          echo "   4. Build with npx react-native build-android"
