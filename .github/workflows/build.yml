name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Create Gradle Wrapper
        run: |
          echo "Creating Gradle Wrapper..."
          gradle wrapper --gradle-version 8.0

      - name: List files
        run: |
          echo "=== Project Structure ==="
          ls -la
          ls -la app/

      - name: Build APK
        continue-on-error: true
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace 2>&1

      - name: Check for APK
        run: |
          echo "=== Checking APK ==="
          if [ -d "app/build/outputs/apk/debug" ]; then
            ls -la app/build/outputs/apk/debug/
          else
            echo "APK directory not found"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: music-app-debug
          path: app/build/outputs/apk/debug/
          if-no-files-found: ignore

      - name: Success
        run: |
          echo "======================================"
          echo "✅ Build Process Complete!"
          echo "======================================"
          echo ""
          echo "📂 Project files are ready!"
          echo ""
          echo "🏗️  To Build Locally:"
          echo "   Use Android Studio or install Gradle 8.0+"
