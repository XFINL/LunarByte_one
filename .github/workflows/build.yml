name: Check Music App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check TypeScript
        run: npx tsc --noEmit --skipLibCheck --skipDefaultLibCheck

      - name: Success Message
        run: |
          echo "========================================="
          echo "✅ MUSIC APP CODE IS READY!"
          echo "========================================="
          echo ""
          echo "📱 Features Implemented:"
          echo "   • Glass UI Design"
          echo "   • Search Screen (with history)"
          echo "   • Player Screen (swipe to change songs)"
          echo "   • Profile Screen"
          echo "   • Floating Tab Bar"
          echo ""
          echo "💾 Repository:"
          echo "   https://github.com/XFINL/LunarByte_one"
          echo ""
          echo "🚀 To build locally (Android APK):"
          echo "   1. Clone repo"
          echo "   2. npx react-native@latest init MusicApp"
          echo "   3. Copy our src/ and config files"
          echo "   4. npx react-native build-android"
          echo ""
          echo "✓ TypeScript checks passed!"
