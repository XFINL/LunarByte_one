name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Check project structure
        run: |
          echo "Project structure:"
          ls -la
          echo "Android directory:"
          ls -la android/
          
      - name: Lint and verify TypeScript
        run: |
          echo "Checking TypeScript compilation..."
          npx tsc --noEmit
          
      - name: Test build
        run: |
          echo "Project files verified successfully!"
          echo "Next steps: To complete Android build, you will need to initialize the project with npx react-native@latest init MusicApp"
